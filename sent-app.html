<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#06080F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sent">
<title>Sent — Sign in</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #06080F; --surface: #1A2133; --border: #1F2A46; --border-lt: #2A3A5C;
  --platinum: #D4E1EE; --text-dim: #7A90A8; --amber: #C8832A; --amber-lt: #F5A84B;
  --steel-lt: #B8CBDF; --red: #f87171;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}
html, body {
  height: 100%; background: var(--bg); color: var(--platinum);
  font-family: var(--sans); display: flex; align-items: center;
  justify-content: center; padding: 32px;
}
.wrap { width: 100%; max-width: 340px; display: flex; flex-direction: column; align-items: center; }
.stamp { width: 72px; height: 80px; margin-bottom: 28px; }
h1 { font-family: var(--serif); font-size: 36px; font-style: italic; color: var(--platinum); margin-bottom: 8px; letter-spacing: -0.5px; }
.sub { font-size: 14px; color: var(--text-dim); margin-bottom: 40px; text-align: center; line-height: 1.6; }
.input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 18px; font-family: var(--sans); font-size: 15px;
  color: var(--platinum); outline: none; transition: border-color 0.2s; margin-bottom: 12px;
}
.input::placeholder { color: var(--text-dim); }
.input:focus { border-color: var(--border-lt); }
.btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  font-family: var(--sans); font-size: 15px; font-weight: 600;
  cursor: pointer; background: var(--amber); color: #1A1410; transition: all 0.2s;
}
.btn:hover { background: var(--amber-lt); }
.msg { text-align: center; font-size: 13px; color: var(--steel-lt); font-style: italic; min-height: 20px; margin-top: 12px; }
.msg.error { color: var(--red); font-style: normal; }
</style>
</head>
<body>
<div class="wrap">
  <svg class="stamp" viewBox="0 0 60 68" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#B8CBDF"/><stop offset="50%" stop-color="#D4E1EE"/><stop offset="100%" stop-color="#8CA4C0"/></linearGradient></defs>
    <rect x="2" y="2" width="56" height="64" rx="3" fill="url(#sg)" opacity="0.15" stroke="url(#sg)" stroke-width="1.5"/>
    <circle cx="2" cy="2" r="4" fill="#06080F"/><circle cx="15" cy="2" r="4" fill="#06080F"/><circle cx="30" cy="2" r="4" fill="#06080F"/><circle cx="45" cy="2" r="4" fill="#06080F"/><circle cx="58" cy="2" r="4" fill="#06080F"/>
    <circle cx="2" cy="66" r="4" fill="#06080F"/><circle cx="15" cy="66" r="4" fill="#06080F"/><circle cx="30" cy="66" r="4" fill="#06080F"/><circle cx="45" cy="66" r="4" fill="#06080F"/><circle cx="58" cy="66" r="4" fill="#06080F"/>
    <circle cx="2" cy="18" r="4" fill="#06080F"/><circle cx="2" cy="34" r="4" fill="#06080F"/><circle cx="2" cy="50" r="4" fill="#06080F"/>
    <circle cx="58" cy="18" r="4" fill="#06080F"/><circle cx="58" cy="34" r="4" fill="#06080F"/><circle cx="58" cy="50" r="4" fill="#06080F"/>
    <rect x="8" y="22" width="44" height="5" rx="2.5" fill="url(#sg)" opacity="0.7"/>
    <rect x="8" y="30" width="44" height="4" rx="2" fill="url(#sg)" opacity="0.5"/>
    <rect x="8" y="37" width="44" height="3" rx="1.5" fill="url(#sg)" opacity="0.3"/>
    <text x="30" y="58" font-family="Georgia,serif" font-size="28" font-style="italic" fill="none" stroke="url(#sg)" stroke-width="1" text-anchor="middle" opacity="0.9">S</text>
  </svg>

  <h1>Sent</h1>
  <p class="sub">Relationships, remembered.<br>Enter your email to get started.</p>
  <input type="email" class="input" id="email" placeholder="your@email.com" autocomplete="email"/>
  <button class="btn" onclick="sendLink()">Send magic link ✦</button>
  <p class="msg" id="msg"></p>
</div>

<script>
const SUPABASE_URL = 'https://ondnsbnwgxnnavxqjuvi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uZG5zYm53Z3hubmF2eHFqdXZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTcwOTksImV4cCI6MjA5MDU3MzA5OX0.GAaGxD-rGb7r1lD4QQhE9yvCx6ZeCDJzFloRsg41IMQ';

if (localStorage.getItem('sb_token')) window.location.href = '/sent-demo.html';

async function sendLink() {
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('msg');
  if (!email || !email.includes('@')) {
    msg.textContent = 'Enter a valid email.'; msg.className = 'msg error'; return;
  }
  msg.textContent = 'Sending…'; msg.className = 'msg';
  const res = await fetch(`${SUPABASE_URL}/auth/v1/otp`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, create_user: true, options: { emailRedirectTo: 'https://sentapp.net/sent-demo.html' } })
  });
  if (res.ok) {
    msg.textContent = '✦ Check your email for the magic link.';
  } else {
    msg.textContent = 'Something went wrong. Try again.'; msg.className = 'msg error';
  }
}
</script>
</body>
</html>
