<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sent</title>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #06080F;
  color: #EEF4FA;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 16px;
}

h1 {
  font-size: 20px;
  margin-bottom: 12px;
}

.card {
  background: #141920;
  border: 1px solid #1F2A46;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}

.button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #2A3A5C;
  color: white;
  margin-top: 8px;
  cursor: pointer;
}

.secondary {
  background: transparent;
  border: 1px solid #2A3A5C;
}

.tabbar {
  display: flex;
  justify-content: space-around;
  border-top: 1px solid #1F2A46;
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #06080F;
}

.tab {
  padding: 12px;
  font-size: 12px;
  color: #7A90A8;
  cursor: pointer;
}

.tab.active {
  color: #EEF4FA;
}

.modal {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #0D1117;
  border-top: 1px solid #1F2A46;
  padding: 16px;
  display: none;
}

.modal.active {
  display: block;
}
</style>
</head>

<body>

<div class="container" id="app">

<h1>Upcoming</h1>

<div id="list"></div>

</div>

<div class="tabbar">
<div class="tab active">Upcoming</div>
<div class="tab">Contacts</div>
<div class="tab">Sent</div>
<div class="tab">Profile</div>
</div>

<div class="modal" id="modal">
<h1>Generate Message</h1>

<select id="voice">
<option>Warm</option>
<option>Funny</option>
<option>Direct</option>
</select>

<button class="button" onclick="generate()">Generate</button>

<div id="output"></div>

<button class="button" onclick="postcard()">Create Postcard</button>
<button class="button secondary" onclick="copy()">Copy</button>

</div>

<script>
let uses = 0;
const limit = 3;

const occasions = [
  { name: "Alex", type: "Birthday", days: 3 },
  { name: "Mom", type: "Anniversary", days: 7 }
];

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  occasions.forEach((o, i) => {
    list.innerHTML += `
      <div class="card">
        <strong>${o.name}</strong><br>
        ${o.type} — ${o.days} days
        <button class="button" onclick="openModal(${i})">
          Generate Message
        </button>
      </div>
    `;
  });
}

function openModal(i) {
  if (uses >= limit) {
    alert("Free limit reached. Upgrade to continue.");
    return;
  }
  document.getElementById("modal").classList.add("active");
}

function generate() {
  uses++;
  document.getElementById("output").innerHTML =
    "Still can't believe how far you've come this year. Proud of you. Happy birthday.";
}

function postcard() {
  alert("Postcard created (hook this to builder)");
}

function copy() {
  navigator.clipboard.writeText(
    document.getElementById("output").innerText
  );
  alert("Copied");
}

render();
</script>

</body>
</html>
